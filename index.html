<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Crawl Google Docs (H1 & Italic)</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f6fa;
        padding: 30px;
      }
      .container {
        max-width: 1200px;
        margin: auto;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      }
      h2 {
        margin-top: 0;
      }
      button {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: #4facfe;
        color: #fff;
        border: none;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .muted {
        font-size: 12px;
        color: #666;
      }
      select {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ddd;
        min-width: 320px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
      }
      th,
      td {
        border: 1px solid #e5e5e5;
        padding: 8px;
        font-size: 13px;
        vertical-align: top;
      }
      th {
        background: #eef3ff;
      }
      code {
        background: #f6f6f6;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .copy-box {
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: all 0.15s ease;
        position: relative;
      }

      .copy-box:hover {
        background: #eef6ff;
        border-color: #4facfe;
      }

      .copy-box::after {
        content: "Click: copy | Double click: slug";

        position: absolute;
        top: -18px;
        right: 6px;
        font-size: 11px;
        color: #4facfe;
        opacity: 0;
        transition: opacity 0.15s;
        pointer-events: none;
      }

      .copy-box:hover::after {
        opacity: 1;
      }

      /* trạng thái vừa double click */
      .copy-box.copied-slug {
        background: #e0f2fe;
        border-color: #0284c7;
        color: #0369a1;
      }

      /* tooltip đổi nội dung khi double click */
      .copy-box.copied-slug::after {
        content: "Đã copy slug SEO";
        color: #0284c7;
        opacity: 1;
      }

      /* highlight row */
      tr.highlight-new {
        background: #ecfeff;
        animation: flashNew 2s ease-out;
      }

      tr.highlight-updated {
        background: #fff7ed;
        animation: flashUpdated 2s ease-out;
      }

      @keyframes flashNew {
        from {
          background: #67e8f9;
        }
        to {
          background: #ecfeff;
        }
      }

      @keyframes flashUpdated {
        from {
          background: #fdba74;
        }
        to {
          background: #fff7ed;
        }
      }

      /* badge */
      .badge {
        display: inline-block;
        margin-left: 6px;
        padding: 2px 6px;
        font-size: 10px;
        font-weight: bold;
        border-radius: 6px;
        vertical-align: middle;
      }

      .badge-new {
        background: #22d3ee;
        color: #000;
      }

      .badge-updated {
        background: #fb923c;
        color: #000;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>📄 Crawl H1 & Italic (My Drive + Shared)</h2>

      <div class="row">
        <button class="primary" onclick="login()">🔐 Đăng nhập Google</button>
        <span id="who" class="muted"></span>
      </div>

      <div class="row">
        <select id="folderSelect" disabled></select>
        <button onclick="startCrawl()">🚀 Bắt đầu crawl</button>
      </div>
      <button onclick="syncUpdates()">🔄 Đồng bộ cập nhật</button>

      <div id="status" class="muted">Chưa có thao tác</div>
      <div style="margin-top: 8px">
        <div
          style="
            height: 18px;
            background: #eee;
            border-radius: 999px;
            overflow: hidden;
          "
        >
          <div
            id="progressBar"
            style="
              height: 100%;
              width: 0%;
              background: linear-gradient(90deg, #4facfe, #00f2fe);
              font-size: 11px;
              line-height: 18px;
              text-align: center;
              color: #000;
            "
          >
            0%
          </div>
        </div>
      </div>
      <div id="docCounter" class="muted" style="margin-top: 4px">
        0 / 0 docs
      </div>
      <div
        style="
          margin-top: 8px;
          padding: 8px 12px;
          background: #f8fafc;
          border: 1px dashed #c7d2fe;
          border-radius: 8px;
          font-size: 13px;
          color: #334155;
        "
      >
        <b>📝 Lưu ý thao tác:</b>
        <ul style="margin: 6px 0 0 18px; padding: 0">
          <li>🖱 <b>Click 1 lần</b> để copy nội dung</li>
          <li>
            🖱 <b>Double click</b> để copy
            <b>slug SEO dạng abc-xyz</b>
          </li>
        </ul>
      </div>

      <table id="resultTable" style="display: none">
        <thead>
          <tr>
            <th>Folder con</th>
            <th>Tên Google Docs</th>
            <th>H1</th>
            <th>Italic</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <script>
      /* ========= CONFIG ========= */
      const CLIENT_ID =
        "860632481172-1nnq4dparmjdqrrehh407uv33ppvu2b7.apps.googleusercontent.com";
      const API_KEY = "AIzaSyC6aOoJLRvkAmOn8MVtsu6yPO-mzK3AR3U";
      const SCOPES = "https://www.googleapis.com/auth/drive.readonly";
      const DISCOVERY_DOCS = [
        "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest",
      ];

      let accessToken = null;
      let totalDocs = 0;
      let crawledCount = 0;
      let lastSyncTime = localStorage.getItem("lastSyncTime") || null;
      const docMetaMap = new Map();
      // lưu hash theo docId
      let docHashStore = JSON.parse(
        localStorage.getItem("docHashStore") || "{}"
      );

      // map docId → <tr>
      const docRowMap = new Map();

      /* ========= AUTH ========= */
      function login() {
        const tc = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: async (t) => {
            accessToken = t.access_token;
            await initGapi();
            gapi.client.setToken({ access_token: accessToken });
            who.textContent = "✅ Đã kết nối Google (My Drive + Shared)";
            await loadAllRootFolders();
          },
        });
        tc.requestAccessToken();
      }

      function buildContentHash(h1, italic) {
        return JSON.stringify({
          h1,
          italic,
        });
      }

      async function countAllDocs(folderId) {
        let count = 0;

        const docs = await getDocsInFolder(folderId);
        count += docs.length;

        const subFolders = await getSubFolders(folderId);
        for (const sub of subFolders) {
          count += await countAllDocs(sub.id);
        }

        return count;
      }

      async function countDocsToSync(folderId) {
        let count = 0;

        const docs = await getDocsInFolder(folderId, true); // syncOnly = true
        count += docs.length;

        const subFolders = await getSubFolders(folderId);
        for (const sub of subFolders) {
          count += await countDocsToSync(sub.id);
        }

        return count;
      }

      function copyText(text) {
        // fallback an toàn nhất
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        ta.style.top = "0";
        document.body.appendChild(ta);

        ta.focus();
        ta.select();

        try {
          document.execCommand("copy");
          status.textContent = "✅ Đã copy nội dung";
        } catch (err) {
          status.textContent = "❌ Không copy được";
        }

        document.body.removeChild(ta);
      }

      function slugify(str) {
        return str
          .toLowerCase()
          .normalize("NFD") // tách dấu
          .replace(/[\u0300-\u036f]/g, "") // xoá dấu tiếng Việt
          .replace(/đ/g, "d")
          .replace(/[^a-z0-9\s-]/g, "") // xoá ký tự đặc biệt
          .replace(/\s+/g, "-") // space → -
          .replace(/-+/g, "-") // gộp --
          .replace(/^-|-$/g, ""); // trim -
      }

      function cleanDocTitle(raw) {
        return raw
          .replace(/^🤝\s*/g, "") // bỏ icon 🤝
          .replace(/.*?\s\/\s*/g, "") // bỏ folder cha "XOILAC /"
          .replace(/^\d+[\.\)\-]\s*/g, "") // bỏ số thứ tự: 69. | 1) | 1-
          .trim();
      }

      function initProgress() {
        progressBar.style.width = "0%";
        progressBar.textContent = "0%";
      }

      function updateProgress() {
        const percent = Math.min(99, crawledCount * 3);
        progressBar.style.width = percent + "%";
        progressBar.textContent = percent + "%";
        docCounter.textContent = `${crawledCount} docs`;
      }

      async function initGapi() {
        return new Promise((resolve) => {
          gapi.load("client", async () => {
            await gapi.client.init({
              apiKey: API_KEY,
              discoveryDocs: DISCOVERY_DOCS,
            });
            resolve();
          });
        });
      }

      /* ========= LOAD ROOT + SHARED ========= */
      async function loadAllRootFolders() {
        const res = await gapi.client.drive.files.list({
          q: `
      mimeType='application/vnd.google-apps.folder'
      and trashed=false
      and (
        'root' in parents
        or sharedWithMe
      )
    `,
          fields: "files(id,name,shared,driveId)",
          pageSize: 1000,
          supportsAllDrives: true,
          includeItemsFromAllDrives: true,
        });

        folderSelect.innerHTML = "";
        res.result.files.forEach((f) => {
          const opt = document.createElement("option");
          opt.value = f.id;
          opt.textContent = f.shared ? `${f.name}` : f.name;
          folderSelect.appendChild(opt);
        });

        folderSelect.disabled = false;
      }
      async function crawlFolderRecursive(folderId, folderPath) {
        const docs = await getDocsInFolder(folderId);

        await processInBatches(docs, 4, async (doc) => {
          const html = await exportDocHTML(doc.id);
          const data = parseHTMLContent(html);

          docHashStore[doc.id] = buildContentHash(data.h1, data.italic);

          appendRow(
            folderPath,
            doc.id,
            doc.name,
            data.h1,
            data.italic,
            doc.modifiedTime
          );

          crawledCount++;
          updateProgress();
        });

        const subs = await getSubFolders(folderId);
        for (const sub of subs) {
          await crawlFolderRecursive(sub.id, folderPath + " / " + sub.name);
        }
      }

      async function syncUpdates() {
        const parentId = folderSelect.value;
        if (!parentId) return alert("Chưa chọn folder");

        crawledCount = 0;
        totalDocs = 0;

        status.textContent = "🔄 Đang kiểm tra thay đổi nội dung...";

        progressBar.style.width = "0%";
        progressBar.textContent = "0%";
        docCounter.textContent = "0 docs";

        // 🔥 yield UI ngay
        await new Promise((r) => requestAnimationFrame(r));

        const rootName = folderSelect.options[folderSelect.selectedIndex].text;

        await syncFolderRecursive(parentId, rootName);

        localStorage.setItem("docHashStore", JSON.stringify(docHashStore));

        progressBar.style.width = "100%";
        progressBar.textContent = "100%";
        docCounter.textContent = `${crawledCount} docs cập nhật`;

        status.textContent =
          crawledCount === 0
            ? "✅ Không có doc thay đổi"
            : `✅ Đã cập nhật ${crawledCount} doc`;
      }

      async function syncFolderRecursive(folderId, folderPath) {
        const docs = await getDocsInFolder(folderId);

        await processInBatches(docs, 4, async (doc) => {
          const html = await exportDocHTML(doc.id);
          const data = parseHTMLContent(html);

          const newHash = buildContentHash(data.h1, data.italic);
          if (docHashStore[doc.id] === newHash) return;

          appendRow(
            folderPath,
            doc.id,
            doc.name,
            data.h1,
            data.italic,
            doc.modifiedTime
          );

          docHashStore[doc.id] = newHash;
          crawledCount++;
          updateProgress();
        });

        const subs = await getSubFolders(folderId);
        for (const sub of subs) {
          await syncFolderRecursive(sub.id, folderPath + " / " + sub.name);
        }
      }

      /* ========= MAIN ========= */
      async function startCrawl() {
        const parentId = folderSelect.value;
        if (!parentId) return alert("Chưa chọn folder cha");

        // 🔥 RESET UI STATE
        crawledCount = 0;
        totalDocs = await countAllDocs(parentId);

        progressBar.style.width = "0%";
        progressBar.textContent = "0%";
        docCounter.textContent = "0 / " + totalDocs + " docs";

        status.textContent = "⏳ Đang crawl dữ liệu...";
        resultTable.style.display = "none";
        resultTable.querySelector("tbody").innerHTML = "";

        const rootName = folderSelect.options[folderSelect.selectedIndex].text;

        // (nếu bạn dùng đếm totalDocs)
        totalDocs = await countAllDocs(parentId);

        await crawlFolderRecursive(parentId, rootName);

        progressBar.style.width = "100%";
        progressBar.textContent = "100%";
        docCounter.textContent = crawledCount + " / " + totalDocs + " docs";

        status.textContent = "✅ Hoàn tất";
        resultTable.style.display = "table";
        lastSyncTime = new Date().toISOString();
        localStorage.setItem("lastSyncTime", lastSyncTime);
        // lưu hash sau crawl full
        localStorage.setItem("docHashStore", JSON.stringify(docHashStore));
      }

      /* ========= HELPERS ========= */
      async function exportDocHTML(docId) {
        const res = await fetch(
          `https://www.googleapis.com/drive/v3/files/${docId}/export?mimeType=text/html`,
          {
            headers: {
              Authorization: "Bearer " + accessToken,
            },
          }
        );

        if (!res.ok) throw new Error("Export HTML failed");
        return await res.text();
      }
      function parseHTMLContent(html) {
        const dom = new DOMParser().parseFromString(html, "text/html");

        const h1 = [...dom.querySelectorAll("h1")]
          .map((e) => e.innerText.trim())
          .filter(Boolean);

        const italic = [...dom.querySelectorAll("em, i")]
          .map((e) => e.innerText.trim())
          .filter(Boolean);

        return { h1, italic };
      }
      async function processInBatches(items, size, handler) {
        for (let i = 0; i < items.length; i += size) {
          const batch = items.slice(i, i + size);
          await Promise.all(batch.map(handler));
          await new Promise((r) => requestAnimationFrame(r)); // UI mượt
        }
      }

      async function getSubFolders(parentId) {
        let folders = [];
        let pageToken = null;

        do {
          const res = await gapi.client.drive.files.list({
            q: `'${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
            fields: "nextPageToken, files(id,name)",
            pageToken,
            supportsAllDrives: true,
            includeItemsFromAllDrives: true,
          });

          folders.push(...(res.result.files || []));
          pageToken = res.result.nextPageToken;
        } while (pageToken);

        return folders;
      }

      async function getDocsInFolder(folderId, syncOnly = false) {
        let q = `'${folderId}' in parents 
    and mimeType='application/vnd.google-apps.document' 
    and trashed=false`;

        if (syncOnly && lastSyncTime) {
          q += ` and modifiedTime > '${lastSyncTime}'`;
        }

        const res = await gapi.client.drive.files.list({
          q,
          fields: "files(id,name,modifiedTime)",
          supportsAllDrives: true,
          includeItemsFromAllDrives: true,
        });

        return res.result.files || [];
      }

      function appendRow(folder, docId, docName, h1, italic, modifiedTime) {
        const cleanTitle = cleanDocTitle(docName);
        const slug = slugify(cleanTitle);

        let meta = docMetaMap.get(docId);
        let tr;
        let isNew = false;
        let isUpdated = false;

        // 🆕 DOC MỚI
        if (!meta) {
          tr = document.createElement("tr");
          docMetaMap.set(docId, {
            tr,
            modifiedTime,
          });
          isNew = true;
        } else {
          tr = meta.tr;

          // 🔄 DOC UPDATE
          if (modifiedTime && meta.modifiedTime !== modifiedTime) {
            isUpdated = true;
            meta.modifiedTime = modifiedTime;
          }
        }

        tr.innerHTML = `
    <td
      class="copy-box folder-cell"
      data-copy="${folder.replace(/"/g, "&quot;")}"
      data-slug="${slugify(folder)}"
      title="Click: copy folder | Double click: copy slug folder"
      style="cursor:pointer; white-space:nowrap"
    >
      ${folder}
    </td>

    <td
      class="copy-box doc-name"
      data-copy="${cleanTitle}"
      data-slug="${slug}"
      title="Click: copy tiêu đề | Double click: copy slug SEO"
      style="cursor:pointer"
    >
      ${docName}
      ${
        isNew
          ? `<span class="badge badge-new">NEW</span>`
          : isUpdated
          ? `<span class="badge badge-updated">UPDATED</span>`
          : ""
      }
    </td>

    <td>
      ${h1
        .map((x) => {
          const safe = x.replace(/"/g, "&quot;");
          return `<div class="copy-box" data-copy="${safe}" data-slug="${slugify(
            x
          )}">${safe}</div>`;
        })
        .join("")}
    </td>

    <td>
      ${italic
        .map((x) => {
          const safe = x.replace(/"/g, "&quot;");
          return `<div class="copy-box" data-copy="${safe}" data-slug="${slugify(
            x
          )}">${safe}</div>`;
        })
        .join("")}
    </td>
  `;

        // append 1 lần duy nhất
        if (!tr.parentNode) {
          resultTable.querySelector("tbody").appendChild(tr);
        }

        // highlight
        if (isNew) {
          tr.classList.add("highlight-new");
        } else if (isUpdated) {
          tr.classList.add("highlight-updated");
        }

        // auto remove highlight
        setTimeout(() => {
          tr.classList.remove("highlight-new", "highlight-updated");
        }, 3000);
      }

      // ✅ CLICK 1 LẦN → COPY TEXT
      document.addEventListener("click", function (e) {
        const box = e.target.closest(".copy-box");
        if (!box) return;

        const text = box.dataset.copy;
        if (text) {
          copyText(text);
        }
      });

      // ✅ DOUBLE CLICK → COPY SLUG + ĐỔI MÀU
      document.addEventListener("dblclick", function (e) {
        const box = e.target.closest(".copy-box");
        if (!box) return;

        const slug = box.dataset.slug;
        if (!slug) return;

        // copy slug
        copyText(slug);

        // xoá trạng thái cũ
        document
          .querySelectorAll(".copy-box.copied-slug")
          .forEach((el) => el.classList.remove("copied-slug"));

        // thêm trạng thái mới
        box.classList.add("copied-slug");

        // tự xoá màu sau 1.2s (nhìn rất "tool nội bộ")
        setTimeout(() => {
          box.classList.remove("copied-slug");
        }, 1200);
      });
    </script>
  </body>
</html>

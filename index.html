<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Crawl Google Docs (H1 & Italic)</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f6fa;
        padding: 30px;
      }
      .container {
        max-width: 1200px;
        margin: auto;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      }
      h2 {
        margin-top: 0;
      }
      button {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: #4facfe;
        color: #fff;
        border: none;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .muted {
        font-size: 12px;
        color: #666;
      }
      select {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ddd;
        min-width: 320px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
      }
      th,
      td {
        border: 1px solid #e5e5e5;
        padding: 8px;
        font-size: 13px;
        vertical-align: top;
      }
      th {
        background: #eef3ff;
      }
      code {
        background: #f6f6f6;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .copy-box {
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: all 0.15s ease;
        position: relative;
      }

      .copy-box:hover {
        background: #eef6ff;
        border-color: #4facfe;
      }

      .copy-box::after {
        content: "Click: copy | Double click: slug";

        position: absolute;
        top: -18px;
        right: 6px;
        font-size: 11px;
        color: #4facfe;
        opacity: 0;
        transition: opacity 0.15s;
        pointer-events: none;
      }

      .copy-box:hover::after {
        opacity: 1;
      }

      /* trạng thái vừa double click */
      .copy-box.copied-slug {
        background: #e0f2fe;
        border-color: #0284c7;
        color: #0369a1;
      }

      /* tooltip đổi nội dung khi double click */
      .copy-box.copied-slug::after {
        content: "Đã copy slug SEO";
        color: #0284c7;
        opacity: 1;
      }

      /* highlight row */
      tr.highlight-new {
        background: #ecfeff;
        animation: flashNew 2s ease-out;
      }

      tr.highlight-updated {
        background: #fff7ed;
        animation: flashUpdated 2s ease-out;
      }

      @keyframes flashNew {
        from {
          background: #67e8f9;
        }
        to {
          background: #ecfeff;
        }
      }

      @keyframes flashUpdated {
        from {
          background: #fdba74;
        }
        to {
          background: #fff7ed;
        }
      }

      /* badge */
      .badge {
        display: inline-block;
        margin-left: 6px;
        padding: 2px 6px;
        font-size: 10px;
        font-weight: bold;
        border-radius: 6px;
        vertical-align: middle;
      }

      .badge-new {
        background: #22d3ee;
        color: #000;
      }

      .badge-updated {
        background: #fb923c;
        color: #000;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>📄 Crawl H1 & Italic (My Drive + Shared)</h2>

      <div class="row">
        <button class="primary" onclick="login()">🔐 Đăng nhập Google</button>
        <span id="who" class="muted"></span>
      </div>

      <div class="row">
        <select id="folderSelect" disabled></select>
        <button onclick="startCrawl()">🚀 Bắt đầu crawl</button>
      </div>
      <div id="status" class="muted">Chưa có thao tác</div>
      <div style="margin-top: 8px">
        <div
          style="
            height: 18px;
            background: #eee;
            border-radius: 999px;
            overflow: hidden;
          "
        >
          <div
            id="progressBar"
            style="
              height: 100%;
              width: 0%;
              background: linear-gradient(90deg, #4facfe, #00f2fe);
              font-size: 11px;
              line-height: 18px;
              text-align: center;
              color: #000;
            "
          >
            0%
          </div>
        </div>
      </div>
      <div id="docCounter" class="muted" style="margin-top: 4px">
        0 / 0 docs
      </div>
      <div
        style="
          margin-top: 8px;
          padding: 8px 12px;
          background: #f8fafc;
          border: 1px dashed #c7d2fe;
          border-radius: 8px;
          font-size: 13px;
          color: #334155;
        "
      >
        <b>📝 Lưu ý thao tác:</b>
        <ul style="margin: 6px 0 0 18px; padding: 0">
          <li>🖱 <b>Click 1 lần</b> để copy nội dung</li>
          <li>
            🖱 <b>Double click</b> để copy
            <b>slug SEO dạng abc-xyz</b>
          </li>
        </ul>
      </div>

      <table id="resultTable" style="display: none">
        <thead>
          <tr>
            <th>Folder con</th>
            <th>Tên Google Docs</th>
            <th>H1</th>
            <th>Italic</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <script>
      /* ========= CONFIG ========= */
      const CLIENT_ID =
        "860632481172-1nnq4dparmjdqrrehh407uv33ppvu2b7.apps.googleusercontent.com";
      const API_KEY = "AIzaSyC6aOoJLRvkAmOn8MVtsu6yPO-mzK3AR3U";

      const SCOPES =
        "https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/documents.readonly";

      const DISCOVERY_DOCS = [
        "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest",
        "https://www.googleapis.com/discovery/v1/apis/docs/v1/rest",
      ];

      let accessToken = null;
      let totalDocs = 0;
      let crawledCount = 0;

      // map docId → <tr>
      const docRowMap = new Map();

      /* ========= AUTH ========= */
      function login() {
        const tc = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: async (t) => {
            accessToken = t.access_token;
            await initGapi();
            gapi.client.setToken({ access_token: accessToken });
            who.textContent = "✅ Đã kết nối Google (My Drive + Shared)";
            await loadAllRootFolders();
          },
        });
        tc.requestAccessToken();
      }

      function buildContentHash(h1, italic) {
        return JSON.stringify({
          h1,
          italic,
        });
      }

      async function countAllDocs(folderId) {
        let count = 0;

        const docs = await getDocsInFolder(folderId);
        count += docs.length;

        const subFolders = await getSubFolders(folderId);
        for (const sub of subFolders) {
          count += await countAllDocs(sub.id);
        }

        return count;
      }

      function copyText(text) {
        // fallback an toàn nhất
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        ta.style.top = "0";
        document.body.appendChild(ta);

        ta.focus();
        ta.select();

        try {
          document.execCommand("copy");
          status.textContent = "✅ Đã copy nội dung";
        } catch (err) {
          status.textContent = "❌ Không copy được";
        }

        document.body.removeChild(ta);
      }

      function slugify(str) {
        return str
          .toLowerCase()
          .normalize("NFD") // tách dấu
          .replace(/[\u0300-\u036f]/g, "") // xoá dấu tiếng Việt
          .replace(/đ/g, "d")
          .replace(/[^a-z0-9\s-]/g, "") // xoá ký tự đặc biệt
          .replace(/\s+/g, "-") // space → -
          .replace(/-+/g, "-") // gộp --
          .replace(/^-|-$/g, ""); // trim -
      }

      function cleanDocTitle(raw) {
        return String(raw || "")
          .replace(/^🤝\s*/g, "")
          .replace(/.*?\s\/\s*/g, "")
          .replace(/^\d+[\.\)\-]\s*/g, "")
          .trim();
      }

      function initProgress() {
        progressBar.style.width = "0%";
        progressBar.textContent = "0%";
      }

      function updateProgress() {
        if (!totalDocs) return;

        const percent = Math.min(
          99,
          Math.round((crawledCount / totalDocs) * 100)
        );

        progressBar.style.width = percent + "%";
        progressBar.textContent = percent + "%";

        docCounter.textContent = crawledCount + " / " + totalDocs + " docs";
      }

      async function initGapi() {
        return new Promise((resolve) => {
          gapi.load("client", async () => {
            await gapi.client.init({
              apiKey: API_KEY,
              discoveryDocs: DISCOVERY_DOCS,
            });
            resolve();
          });
        });
      }

      /* ========= LOAD ROOT + SHARED ========= */
      async function loadAllRootFolders() {
        const res = await gapi.client.drive.files.list({
          q: `
      mimeType='application/vnd.google-apps.folder'
      and trashed=false
      and (
        'root' in parents
        or sharedWithMe
      )
    `,
          fields: "files(id,name,shared,driveId)",
          pageSize: 1000,
          supportsAllDrives: true,
          includeItemsFromAllDrives: true,
        });

        folderSelect.innerHTML = "";
        res.result.files.forEach((f) => {
          const opt = document.createElement("option");
          opt.value = f.id;
          opt.textContent = f.shared ? `${f.name}` : f.name;
          folderSelect.appendChild(opt);
        });

        folderSelect.disabled = false;
      }
      async function crawlFolderRecursive(folderId, folderPath) {
        // 1️⃣ Lấy docs trong folder hiện tại
        const docs = await getDocsInFolder(folderId);

        for (const doc of docs) {
          try {
            const data = await readDoc(doc.id);
            // ✅ append NGAY khi xong 1 doc
            appendRow(
              folderPath,
              doc.id,
              doc.name,
              data.h1,
              data.italic,
              doc.modifiedTime
            );
          } catch (e) {
            appendRow(folderPath, doc.id, doc.name, ["❌ Lỗi đọc doc"], []);
          }

          // 2️⃣ cập nhật progress
          crawledCount++;
          updateProgress();

          // 3️⃣ nhường UI repaint
          await new Promise((r) => setTimeout(r, 0));
        }

        // 4️⃣ crawl folder con
        const subFolders = await getSubFolders(folderId);
        for (const sub of subFolders) {
          await crawlFolderRecursive(sub.id, folderPath + " / " + sub.name);
        }
      }
      /* ========= MAIN ========= */
      async function startCrawl() {
        const parentId = folderSelect.value;
        if (!parentId) return alert("Chưa chọn folder cha");

        // 🔥 RESET UI STATE
        crawledCount = 0;
        totalDocs = await countAllDocs(parentId);

        progressBar.style.width = "0%";
        progressBar.textContent = "0%";
        docCounter.textContent = "0 / " + totalDocs + " docs";

        status.textContent = "⏳ Đang crawl dữ liệu...";
        resultTable.style.display = "none";
        resultTable.querySelector("tbody").innerHTML = "";

        const rootName = folderSelect.options[folderSelect.selectedIndex].text;

        // (nếu bạn dùng đếm totalDocs)
        totalDocs = await countAllDocs(parentId);

        await crawlFolderRecursive(parentId, rootName);

        progressBar.style.width = "100%";
        progressBar.textContent = "100%";
        docCounter.textContent = crawledCount + " / " + totalDocs + " docs";

        status.textContent = "✅ Hoàn tất";
        resultTable.style.display = "table";
      }

      /* ========= HELPERS ========= */
      async function getSubFolders(parentId) {
        let folders = [];
        let pageToken = null;

        do {
          const res = await gapi.client.drive.files.list({
            q: `'${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
            fields: "nextPageToken, files(id,name)",
            pageToken,
            supportsAllDrives: true,
            includeItemsFromAllDrives: true,
          });

          folders.push(...(res.result.files || []));
          pageToken = res.result.nextPageToken;
        } while (pageToken);

        return folders;
      }

      async function getDocsInFolder(folderId) {
        let q = `'${folderId}' in parents 
    and mimeType='application/vnd.google-apps.document' 
    and trashed=false`;

        const res = await gapi.client.drive.files.list({
          q,
          fields: "files(id,name,modifiedTime)",
          supportsAllDrives: true,
          includeItemsFromAllDrives: true,
        });

        return res.result.files || [];
      }

      async function readDoc(docId) {
        const res = await gapi.client.docs.documents.get({
          documentId: docId,
        });

        const body = res.result.body.content;
        const h1 = [];
        const italic = [];

        body.forEach((block) => {
          const p = block.paragraph;
          if (!p) return;

          const style = p.paragraphStyle?.namedStyleType;

          let italicBuffer = ""; // 🔥 buffer nối italic trong 1 paragraph

          p.elements.forEach((el) => {
            const raw = el.textRun?.content;
            if (typeof raw !== "string") return;

            const text = raw.replace(/\n/g, "").trim();

            if (!text) return;

            const ts = el.textRun.textStyle || {};

            // H1 giữ nguyên
            if (style === "HEADING_1") {
              h1.push(text);
            }

            // 🔥 ITALIC (kể cả vừa bold vừa italic)
            if (ts.italic) {
              italicBuffer += text + " ";
            } else {
              // gặp đoạn không italic → flush buffer
              if (italicBuffer.trim()) {
                italic.push(italicBuffer.trim());
                italicBuffer = "";
              }
            }
          });

          // flush cuối paragraph
          if (italicBuffer.trim()) {
            italic.push(italicBuffer.trim());
          }
        });

        return { h1, italic };
      }

      function appendRow(folder, docId, docName, h1, italic) {
        const cleanTitle = cleanDocTitle(docName);
        const slug = slugify(cleanTitle);

        const tr = document.createElement("tr");

        const safeFolder = String(folder).replace(/"/g, "&quot;");

        tr.innerHTML = `
    <td class="copy-box"
        data-copy="${safeFolder}"
        data-slug="${slugify(folder)}"
        style="white-space:nowrap">
      ${folder}
    </td>

    <td class="copy-box"
        data-copy="${cleanTitle}"
        data-slug="${slug}">
      ${docName}
    </td>

    <td>
      ${h1
        .map((x) => {
          const safe = String(x).replace(/"/g, "&quot;");
          return `<div class="copy-box"
                     data-copy="${safe}"
                     data-slug="${slugify(x)}">${safe}</div>`;
        })
        .join("")}
    </td>

    <td>
      ${italic
        .map((x) => {
          const safe = String(x).replace(/"/g, "&quot;");
          return `<div class="copy-box"
                     data-copy="${safe}"
                     data-slug="${slugify(x)}">${safe}</div>`;
        })
        .join("")}
    </td>
  `;

        resultTable.querySelector("tbody").appendChild(tr);
      }

      // ✅ CLICK 1 LẦN → COPY TEXT
      document.addEventListener("click", function (e) {
        const box = e.target.closest(".copy-box");
        if (!box) return;

        const text = box.dataset.copy;
        if (text) {
          copyText(text);
        }
      });

      // ✅ DOUBLE CLICK → COPY SLUG + ĐỔI MÀU
      document.addEventListener("dblclick", function (e) {
        const box = e.target.closest(".copy-box");
        if (!box) return;

        const slug = box.dataset.slug;
        if (!slug) return;

        // copy slug
        copyText(slug);

        // xoá trạng thái cũ
        document
          .querySelectorAll(".copy-box.copied-slug")
          .forEach((el) => el.classList.remove("copied-slug"));

        // thêm trạng thái mới
        box.classList.add("copied-slug");

        // tự xoá màu sau 1.2s (nhìn rất "tool nội bộ")
        setTimeout(() => {
          box.classList.remove("copied-slug");
        }, 1200);
      });
    </script>
  </body>
</html>
